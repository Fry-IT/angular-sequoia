<ng-form name="sequoiaSearchForm" data-ng-submit="search()" novalidate>
  <input type="text" placeholder="{{::buttons.searchText}}" data-ng-model="query" name="search" data-ng-disabled="isEditing" />
  <button class="sequoia-button sequoia-button-success" type="button" data-ng-if="query.length" data-ng-click="search()" data-ng-bind-html="buttons.search"></button>
  <button class="sequoia-button sequoia-button-default" type="button" data-ng-if="isSearching" data-ng-click="clear()" data-ng-bind-html="buttons.searchClear"></button>
</ng-form>
