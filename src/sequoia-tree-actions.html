<ul>
  <li data-ng-if="(model.length || onlySelected) && !isEditing && buttons.showSelected !== false">
    <button class="sequoia-button sequoia-button-info" type="button" data-ng-click="toggleSelected()" data-ng-bind-html="model.length && !onlySelected ? buttons.showSelected : !model.length && onlySelected ? buttons.backToList : buttons.hideSelected"></button>
  </li>

  <li data-ng-if="model.length && onlySelected && !isEditing">
    <a class="sequoia-button sequoia-button-info" type="button" data-ng-click="deselectAll()" data-ng-bind-html="buttons.deselectAll"></a>
  </li>

  <li data-ng-if="isEditing && !onlySelected">
    <button class="sequoia-button sequoia-button-success" type="button" data-ng-click="addNode()" data-ng-bind-html="buttons.addNode"></button>
  </li>

  <li data-ng-if="canEdit && !onlySelected">
    <button class="sequoia-button sequoia-button-info" type="button" data-ng-click="toggleEditing(sequoiaEditForm)" data-ng-bind-html="isEditing ? buttons.done : buttons.edit"></button>
  </li>

</ul>
